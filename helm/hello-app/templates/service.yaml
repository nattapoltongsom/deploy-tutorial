# Service — เปิดให้เข้าถึง app จากภายนอก
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hello-app
  labels:
    app: hello-app
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    app: hello-app
